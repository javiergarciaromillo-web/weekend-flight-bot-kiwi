name: Weekend Flight Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure data folders exist
        run: |
          mkdir -p data
          mkdir -p debug

      - name: Restore historical DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/prices.db
          key: flight-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            flight-db-${{ github.ref_name }}-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bot
        env:
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python -m src.main

      - name: Save historical DB cache
        uses: actions/cache/save@v4
        with:
          path: data/prices.db
          key: flight-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload DB
        uses: actions/upload-artifact@v4
        with:
          name: flight-history
          path: data/prices.db
          if-no-files-found: warn

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-pages
          path: debug/
          if-no-files-found: warn
